    <div class="top-bar">

            <div class="tbef communication">

            <div class="tbef invidual">

    <div class="content">

                <a href="https://github.com/ethorizon-cn" target="_blank" rel="noopener" title="Github">

            <div class="cont qq">
                <a href="https://qm.qq.com/q/gt48pry3l0" target="_blank" rel="noopener" title="QQ">

            <div class="cont wechat">
                <a href="wechat.jpg" target="_blank" rel="noopener" title="微信-Wechat">

            <div class="cont bilibili">
                <a href="https://space.bilibili.com/3537121040140965" target="_blank" rel="noopener" title="哔哩哔哩（B站）-Bilibili">
                    <img src="/Bilibili.png" alt="Bilibili" class="bilibili-icon">

            </div>
            <div class="cont email">
                <a href="mailto:themillionbyter@outlook.com" target="_blank" rel="noopener" title="Outlook邮箱">

        <!--
        <div class="video">
            <iframe src="https://player.bilibili.com/player.html?isOutside=true&aid=928861104&bvid=BV1uT4y1P7CX&cid=287639008&p=1" allowfullscreen="true" style="width: 49%; height: 500px; margin: 10px 25.5% auto 25.5%;"></iframe>
        </div>
        -->
    </div>
    <style>
        @font-face {
            font-family: 'TencentSansW7';
            src: url('/TencentSans_W7.ttf')
        }
        body{
            background-image: url("/default.png");
            background-repeat: no-repeat;
            background-position: top;
            background-attachment: fixed;
            height: 2048px;
        }
        .top-bar{
            display: flex;
            gap: 30px;
            width: 60%;
            height: 50px;
            z-index: 50;
            position: fixed;
            top: 5px;
            left: 5px;
            margin-left: 20%;
            margin-right: 20%;
        }
        .function-zone{
            display: flex;
            flex: none;
            margin-left: 20%;
            width: 60%;
            height: 40px;
            border-radius: 10px;
            background-color: rgb(64, 64, 64);
            justify-content: center;
        }
        .function-zone:hover{
            background-color: rgba(64, 64, 64, 0.3);
        }
        .function-zone:not(:hover){
            background-color: rgba(64, 64, 64, 0);
        }
        .wbstName{
            margin: -3px 10%;
            height: 100%;
            font-size: 30px;
            font-weight: 500;
            font-family: 'TencentSansW7', Tahoma, Verdana, sans-serif;
            color: aliceblue;
            text-align: center;
            cursor: default;
            z-index: 50;
        }
        .side-bar{
            top: 0px;
            left: 0px;
            width: 300px;
            height: 100%;
            position: fixed;
        }
        .fa-bars{
            justify-content: center;
            align-items: center;
        }
        .navZoneBtn{
            cursor: pointer;
            height: 40px;
            width: 40px;
            border-radius: 10px;
            background-color: rgba(0,0,0,0);
            color: aliceblue;
            text-align: center;
            margin: 5px 5px;
            border-color: rgba(0, 0, 0, 0);
            z-index: 100;
        }
        .navZone {
            top: 0px;
            left: -30%;
            width: 30%;
            height: 100%;
            background-color: aliceblue;
            opacity: 90%;
            position: fixed;
            z-index: 99;
            transition: all 400ms ease;
        }
        .navZone ~ .navZoneBg{
            position: fixed;
            top: 0;
            left: 100%;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0);
            pointer-events: none;
        }
        .navZone.navActive {
            left: 0%;
        }
        .navZone.navActive ~ .navZoneBg {
            left: 0%;
            background-color: rgba(0,0,0,0.5);
            transition: background-color 400ms ease;
        }
        .navZoneBtn:hover,.tbef:hover{
            color: rgba(210,218,225,1);
            background-color: rgba(0,0,0,0.3);
        }
        .navZoneBtn:not(:hover),.tbef:not(:hover){
            color: aliceblue;
            background-color: rgba(0,0,0,0);
        }
        .postcard{
            display: flex;
            margin: 15px 5%;
            width: 90%;
            height: 130px;
            border-radius: 10px;
            background-color: whitesmoke;
            justify-content: flex-start;
            align-items: center;
            box-shadow: 2px 2px 2px 1px rgba(0,0,0,0.4);
            overflow-x: scroll;
        }
        .avatar{
            flex: none;
            margin-left: 5%;
            width: 100px;
            height: 100px;
            border-radius: 50%;
            overflow: hidden;
            cursor: pointer;
        }
        .avatar img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }
        .divider{
            width: 2px;
            height: 75%;
            margin-left: 5%;
            border-radius: 10px;
            background-color: rgba(169, 169, 169, 0.5);
        }
        .name{
            margin: auto auto 19% 10px;
            width: 50%;
            height: 35%;
            border-radius: 10px;
            font-size: 30px;
            font-weight: 800;
            font-family: 'TencentSansW7', Tahoma, Verdana, sans-serif;
            align-items: center;
            justify-content: flex-start;
            transform: scaleX(80%);
        }
        .tbef{
            padding-top: 7px;
            align-items: center;
            justify-content: center;
            color: aliceblue;
            text-align: center;
            cursor: pointer;
            background-color: rgba(0,0,0,0);
            border-radius: 10px;
            flex: 1;
        }
        .title {
            color: azure;
            font-family: 'TencentSansW7', Tahoma, Verdana, sans-serif;
            height: 100px;
            margin-top: 20%;
            font-size: 60px;
            font-weight: 900;
            text-align: center;
            border-radius: 10px;
            justify-content: center;
            cursor: default;
            width: 100%;
        }
        .title:hover{
            opacity: 100%;
        }
        .title,.title:not(:hover){
            opacity: 80%;
        }
        .contact{
            display: flex;
            justify-content: center;
            height: 40px;
            width: 20%;
            margin: 0px 40%;
            border-radius: 10px;
            background-color: rgba(0,0,0,0.3);
        }
        .cont{
            text-align: center;
            justify-content: center;
            cursor: pointer;
            background-color: rgba(0,0,0,0);
            border-radius: 10px;
            flex: 1;
            font-size: 25px;
        }
        .cont:hover{
            background-color: rgba(0,0,0,0.3);
        }
        .cont:not(:hover){
            background-color: rgba(0, 0, 0, 0);
        }
        .bilibili-icon{
            justify-content: center;
            text-align: center;
            margin-top: 3px;
            scale: 80%;
        }
        a,a:link,a:visited,a:active{
            color: aliceblue;
            text-decoration: none;
        }
        a:hover{
            color: rgba(210,218,225,1);
        }
        a:not(:hover){
            color: aliceblue;
        }
        :hover,:not(:hover),:active,:not(:active){
            transition: all 400ms ease;
        }
    </style>
    <script>
        let navActive = false;
        const navZoneBtn = document.querySelector('.navZoneBtn');
        const navZone = document.querySelector('.navZone');
        // 切换侧栏显示
        navZoneBtn.addEventListener('click', function(e) {
            navActive = !navActive;
            navZone.classList.toggle('navActive', navActive);
            e.stopPropagation();
        });
        // 点击侧栏外部关闭
        document.addEventListener('click', function(e) {
            if (navActive && !navZone.contains(e.target) && e.target !== navZoneBtn) {
                navActive = false;
                navZone.classList.remove('navActive');
            }
        });
        // 防止点击侧栏内部冒泡关闭
        navZone.addEventListener('click', function(e) {
            e.stopPropagation();
        });
    </script>
</body>
</html>
