# INJECT >>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>> start
# Docs: https://redefine-docs.ohevan.com/inject
inject:
  # Whether to enable inject
  enable: true #<###################################################################################################################################################################################################################NOTICE THIS
  # Inject custom head html code
  head: 
    - |
      <style>
        /* 全局 */
        /* 自定义字体 */
        * {
          font-family: 'TencentSans';
        }

        /* transition（preloader除外） */
        *:not(.letter,.odometer.odometer-auto-theme *) {
          transition: all 0.2s ease !important;
        }


        /* preloader区域 */
        /* 使用系统默认字体防止跳变&字符居中防止换行时出现问题 */
        .ml13 * {
          font-family: sans-serif !important;
          font-weight: bold !important;
          justify-content: center !important;
        }


        /* 代码块 */
        /* 使用Geist Mono字体 */
        .code * {
          font-family: 'Geist Mono', Courier, monospace !important;
        }


        /* 右侧工具栏 */
        /* 固定位置 */
        .right-side-tools-container {
          position: fixed !important;
          bottom: 5% !important;
          right: 38px !important;
        }

        /* hover时隐藏百分号 */
        .side-tools-container .visible-tools-list .tool-scroll-to-top:hover .centSymbol {
        display: none;
        }


        /* 滚动条 */
        /* 隐藏滚动条 */
        body::-webkit-scrollbar {
          display: none;
        }

        body {
          overflow: auto;
          -ms-overflow-style: none;
          scrollbar-width: none;
        }


        /* 图片查看器 */
        /* 调整按钮层级 */
        .image-viewer-prev {
          z-index: 99;
        }

        /* 自定义背景图 */
        /* 亮色模式 */
        body.light-mode #swup {
          background-image: url('/images/light4_greatwall2_blur_15px.png') !important;
          background-size: cover;
          background-position: center;
          background-repeat: no-repeat;
          background-attachment: fixed;
        }

        /* 深色模式 */
        body.dark-mode #swup {
          background-image: url('/images/dark1_blur_15px.jpg') !important;
          background-size: cover;
          background-position: center;
          background-repeat: no-repeat;
          background-attachment: fixed;
        }

        /* 右键菜单 */
        #RMBMenu {
          z-index: 9999;
          background-color: var(--background-color);
          justify-content: center;
          -webkit-backdrop-filter: blur(5px);
          backdrop-filter: blur(5px);
          border-radius: 10px !important;
          opacity: 0;
          transition: all 0.2s ease;
        }

        /* 百宝箱子元素模糊便于识别 */
        .p-5.rounded-xl.redefine-box-shadow-flat.transition-all.duration-300.hover\:transform.hover\:-translate-y-1 {
          -webkit-backdrop-filter: blur(5px);
          backdrop-filter: blur(5px);
        }

      </style>
      <script src="https://clipboard.nodejs.cn/clipboard.min.js"></script>
      <script data-swup-reload-script type="text/javascript">
        (function () {
            function inject() {
                // 为右下角工具添加百分号
                const rightBottomTools = document.getElementsByClassName('right-bottom-tools tool-scroll-to-top flex justify-center items-center')[0];
                const centSymbol = document.createElement('span');

                centSymbol.className = 'centSymbol';
                centSymbol.style.fontSize = '16px';
                centSymbol.innerHTML = '%';

                rightBottomTools.appendChild(centSymbol);


                // 右键菜单
                /* const RMBMenu = document.getElementById('RMBMenu');

                document.addEventListener('contextmenu', e=>{
                    e.preventDefault();
                    RMBMenu.className = 'home-article-item RMBMenu-visible';
                    RMBMenu.style.left = e.clientX + 'px';
                    RMBMenu.style.top = e.clientY + 'px';
                    RMBMenu.style.opacity = '0.8';
                    RMBMenu.showPopover();
                });

                document.addEventListener('click', e=>{
                    if (RMBMenu && !RMBMenu.contains(e.target)) {
                    RMBMenu.className = 'home-article-item RMBMenu-invisible';
                    RMBMenu.style.opacity = '0';
                    RMBMenu.hidePopover();
                    }
                }); */


                // 历史上的今天
                const siteName = document.getElementsByClassName('site-name')[0];
                if (siteName) {
                    siteName.innerHTML = '历史上的今天';
                }


                // 全屏
                const documentElement = document.documentElement;
                let isFullScreen = false;

                document.addEventListener('fullscreenchange', () => {
                    isFullScreen = !isFullScreen;
                });
                function toggleFullScreen() {
                    if (isFullScreen == false) {
                    try {
                        if (documentElement.requestFullscreen) {
                        documentElement.requestFullscreen();
                        } else if (documentElement.mozRequestFullScreen) { // Firefox
                        documentElement.mozRequestFullScreen();
                        } else if (documentElement.webkitRequestFullscreen) { // Chrome & Safari
                        documentElement.webkitRequestFullscreen();
                        } else if (documentElement.msRequestFullscreen) { // IE
                        documentElement.msRequestFullscreen();
                        }
                    } catch (error) {
                        console.error("尝试启用全屏模式时出错：", error);
                    }
                    } else if (isFullScreen == true) {
                    try {
                        if (document.exitFullscreen) {
                        document.exitFullscreen();
                        } else if (document.mozCancelFullScreen) { // Firefox
                        document.mozCancelFullScreen();
                        } else if (document.webkitExitFullscreen) { // Chrome & Safari
                        document.webkitExitFullscreen();
                        } else if (document.msExitFullscreen) { // IE
                        document.msExitFullscreen();
                        }
                    } catch (error) {
                        console.error("尝试禁用全屏模式时出错：", error);
                    }
                    }
                    RMBMenu.hidePopover();
                };
            };


            //在切页和页面刚加载时加载inject。如果页面还在加载中，则等待DOMContentLoaded事件触发后再执行inject
            if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', inject);
            } else {
            inject();
            }
        })();
      </script>
  # Inject custom footer html code
  footer:
    - |
      <div id="RMBMenu" popover>
        <div class="RMBMChild" id="RMBM-Hotbar">
            <span>
                <a id="HbChild-Refresh" href="javascript:window.location.reload();" title="刷新">
                    <i class="fa-solid fa-arrows-rotate"></i>
                </a>
            </span>
            <span>
                <a id="HbChild-FullScreen" href="javascript:toggleFullScreen();" title="切换全屏">
                    <i class="fa-solid fa-expand"></i>
                </a>
            </span>
            <span>
                <a id="HbChild-Settings" href="javascript:toggleSettings();" title="设置">
                    <i class="fa-solid fa-gear"></i>
                </a>
            </span>
        </div>
        <div class="RMBMChild" id="RMBM-Divider">
        </div>
        <div class="RMBMChild" id="RMBM-DetailedContents">
            <div>
                <a id="DCChild-RandomJump" href="javascript:RandomJump();" title="">
                    <i class="fa-solid fa-paper-plane">清风翻书</i>
                </a>
            </div>
            <div>
                <a id="DCChild-CopyURL" href="javascript:CopyURL();" title="">
                    <i class="fa-solid fa-clipboard">复制本页链接</i>
                </a>
            </div>
            <div>
                <a id="DCChild-Info" href="/about/" title="">
                    <i class="fa-solid fa-info-circle">网站信息</i>
                </a>
            </div>
        </div>
      </div>
# INJECT <<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<< end


# PLUGINS >>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>>> start
# Docs: https://redefine-docs.ohevan.com/plugins
plugins:
  # RSS feed. Requires hexo-generator-feed (npm i hexo-generator-feed). See https://github.com/hexojs/hexo-generator-feed
  feed:
    enable: false # Whether to enable
  # Aplayer. See https://github.com/DIYgod/APlayer
  aplayer:
    enable: true # Whether to enable
    type: fixed # fixed, mini
    audios:
      - name: Alpha # audio name
        artist: C418 # audio artist
        url: /audios/C418 - Alpha.mp4 # audio url
        cover: /images/C418 - Alpha.jpg # audio cover url
        lrc: /lrc/C418 - Alpha.lrc # audio cover lrc
#      - name: # audio name
#        artist: # audio artist
#        url: # audio url
#        cover: # audio cover url
#        lrc: # audio cover lrc
      # .... you can add more audios here
  # Mermaid JS. Requires hexo-filter-mermaid-diagrams (npm i hexo-filter-mermaid-diagrams). See https://mermaid.js.org/
  mermaid:
    enable: false # enable mermaid or not
    version: "11.4.1" # default v11.4.1
    theme:
      light: "default"
      dark: "dark"
# PLUGINS <<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<< end


